<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspector Workspace | Mezha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        ink: '#111827',
                        mist: '#f3f4f6',
                        signal: '#0f766e',
                        flare: '#f59e0b'
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
</head>
<body class="min-h-screen bg-mist text-ink font-sans" x-data="{ refreshing: false, lastUpdated: null }">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-36 -left-24 w-[30rem] h-[30rem] rounded-full bg-cyan-300/25 blur-3xl"></div>
        <div class="absolute top-1/3 -right-20 w-[24rem] h-[24rem] rounded-full bg-amber-200/35 blur-3xl"></div>
    </div>

    <header class="sticky top-0 z-30 border-b border-white/70 bg-white/80 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 md:h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-2xl bg-ink text-white grid place-content-center font-black">M</div>
                <div>
                    <p class="text-xl font-black tracking-tight leading-none">Mezha</p>
                    <p class="mt-1 text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Inspector Workspace</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 rounded-full bg-emerald-50 border border-emerald-200 px-3 py-1 text-xs font-black uppercase tracking-widest text-signal">
                    <span class="w-2 h-2 rounded-full bg-signal"></span>
                    На зміні
                </div>
                <button hx-post="/api/auth/logout" hx-swap="none" class="h-10 px-4 rounded-xl border border-slate-300 bg-white text-sm font-bold text-slate-600 hover:text-red-600 hover:border-red-200 inline-flex items-center">Вийти</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
        <section class="rounded-3xl border border-slate-200 bg-white/90 backdrop-blur p-6 md:p-8 shadow-[0_20px_50px_-30px_rgba(15,23,42,.3)]">
            <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5">
                <div>
                    <p class="text-[11px] uppercase tracking-[0.2em] font-black text-slate-400">Validation Queue</p>
                    <h1 class="mt-2 text-3xl md:text-4xl font-black tracking-tight">Черга на валідацію</h1>
                    <p class="mt-2 text-sm md:text-base text-slate-600 max-w-2xl">Порівняйте фото з місця з висновком моделі та прийміть юридично коректне рішення по кожному кейсу.</p>
                    <p class="mt-3 text-xs font-bold text-slate-500" x-show="lastUpdated" x-cloak>
                        Останнє оновлення: <span x-text="lastUpdated"></span>
                    </p>
                </div>

                <div class="flex flex-wrap items-center gap-3">
                    <button
                        hx-get="/api/anomalies/pending-validation/html"
                        hx-target="#validation-queue"
                        hx-swap="innerHTML"
                        hx-vals='js:{_ts: Date.now()}'
                        @htmx:before-request="refreshing = true"
                        @htmx:after-request="refreshing = false; if ($event.detail.successful) { lastUpdated = new Date().toLocaleTimeString('uk-UA'); }"
                        class="h-11 px-5 rounded-xl bg-ink text-white text-sm font-extrabold hover:bg-slate-900 inline-flex items-center justify-center gap-2 disabled:opacity-60"
                        :disabled="refreshing"
                    >
                        <svg class="w-4 h-4" :class="refreshing ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m14.836 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-14.836-2m14.836 2H15"/></svg>
                        <span x-show="!refreshing">Оновити дані</span>
                        <span x-show="refreshing" x-cloak>Оновлення...</span>
                    </button>
                </div>
            </div>

            <div class="mt-8" id="validation-queue" hx-get="/api/anomalies/pending-validation/html" hx-trigger="load" hx-swap="innerHTML">
                <div class="rounded-3xl border border-slate-200 bg-white p-8 animate-pulse">
                    <div class="h-6 w-56 rounded bg-slate-200 mb-6"></div>
                    <div class="grid lg:grid-cols-2 gap-6">
                        <div class="h-64 rounded-2xl bg-slate-200"></div>
                        <div class="h-64 rounded-2xl bg-slate-200"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
