<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Інспектора | Межа</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        meza: {
                            50: '#eef5ff',
                            500: '#0057B7',
                            700: '#003f8a'
                        }
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans min-h-screen">
    <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 rounded-xl bg-meza-500 text-white grid place-content-center font-black">M</div>
                <div>
                    <p class="font-extrabold leading-none">Межа</p>
                    <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-meza-500 mt-1">Кабінет Валідатора</p>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <div class="hidden sm:flex items-center gap-2 text-sm font-semibold text-slate-600">
                    <span class="h-2 w-2 rounded-full bg-green-500"></span>
                    На зміні
                </div>
                <a href="/login" class="text-sm font-bold text-slate-500 hover:text-red-600">Вийти</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Черга на валідацію</h1>
                <p class="mt-2 text-sm text-slate-500">Порівняйте реальність з висновком ШІ та прийміть юридичне рішення.</p>
            </div>
            <button
                hx-get="/api/anomalies/pending-validation/html"
                hx-target="#validation-queue"
                class="h-11 px-5 rounded-xl border border-slate-200 bg-white text-sm font-bold text-slate-700 hover:border-meza-500 hover:text-meza-500"
            >Оновити чергу</button>
        </div>

        <div id="validation-queue" hx-get="/api/anomalies/pending-validation/html" hx-trigger="load" class="space-y-8">
            <div class="rounded-3xl border border-slate-200 bg-white p-8 animate-pulse">
                <div class="h-6 w-1/3 rounded bg-slate-200 mb-6"></div>
                <div class="grid lg:grid-cols-2 gap-6">
                    <div class="h-64 rounded-2xl bg-slate-200"></div>
                    <div class="h-64 rounded-2xl bg-slate-200"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
