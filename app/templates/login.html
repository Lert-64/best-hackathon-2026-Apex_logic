<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація | Межа</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'meza-blue': '#0057B7',
                        'meza-dark': '#003f8a',
                        'charcoal': '#1e293b',
                    }
                }
            }
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        [x-cloak] { display: none !important; }
        
        body { 
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            -webkit-font-smoothing: antialiased; 
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="text-charcoal font-sans min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-md px-4 fade-in">
        <div class="flex flex-col items-center justify-center gap-4 mb-8">
            <div class="w-12 h-12 bg-meza-blue text-white rounded-xl flex items-center justify-center font-black text-2xl tracking-tighter shadow-lg transform rotate-3">M</div>
            <div class="text-center">
                <h1 class="text-3xl font-extrabold tracking-tight text-charcoal">
                    Межа
                </h1>
                <p class="mt-2 text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">
                    Система моніторингу
                </p>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-sm py-8 px-6 border border-slate-200 shadow-2xl rounded-2xl sm:px-10">
            <form 
                hx-post="/api/auth/login" 
                hx-target="#error-message" 
                hx-swap="innerHTML"
                x-data="{ loading: false }"
                @submit="loading = true"
                @htmx:after-request="loading = false"
                class="space-y-6"
            >
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">
                        Логін
                    </label>
                    <div class="relative">
                        <input 
                            id="username" 
                            name="username" 
                            type="text" 
                            required 
                            class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-meza-blue focus:border-transparent sm:text-sm transition-all bg-slate-50 focus:bg-white"
                            placeholder="Введіть ваш логін"
                        >
                    </div>
                </div>

                <div x-data="{ showPassword: false }">
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">
                        Пароль
                    </label>
                    <div class="relative rounded-lg shadow-sm">
                        <input 
                            id="password" 
                            name="password" 
                            :type="showPassword ? 'text' : 'password'" 
                            required 
                            class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-meza-blue focus:border-transparent sm:text-sm transition-all bg-slate-50 focus:bg-white pr-10"
                            placeholder="••••••••"
                        >
                        <button 
                            type="button" 
                            @click="showPassword = !showPassword"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-slate-400 hover:text-meza-blue focus:outline-none transition-colors"
                        >
                            <svg x-show="!showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg x-show="showPassword" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="text-sm text-red-600 font-bold text-center empty:hidden bg-red-50 p-3 rounded-lg border border-red-100"></div>

                <div class="pt-2">
                    <button 
                        type="submit" 
                        :disabled="loading"
                        class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-meza-blue hover:bg-meza-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-meza-blue disabled:opacity-70 disabled:cursor-not-allowed transition-all active:scale-[0.98]"
                    >
                        <span x-show="!loading">Авторизуватися</span>
                        <span x-show="loading" x-cloak class="flex items-center gap-2">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Завантаження...
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-auto pt-8 pb-6 text-center fade-in">
        <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">&copy; 2026 Межа</p>
    </div>

</body>
</html>
