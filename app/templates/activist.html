<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volunteer Terminal | Mezha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        ink: '#111827',
                        mist: '#f3f4f6',
                        signal: '#0f766e',
                        flare: '#f59e0b'
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-mist text-ink font-sans">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-40 -left-20 w-[26rem] h-[26rem] rounded-full bg-cyan-300/30 blur-3xl"></div>
        <div class="absolute bottom-0 -right-16 w-[24rem] h-[24rem] rounded-full bg-amber-200/40 blur-3xl"></div>
    </div>

    <div class="mx-auto w-full max-w-md min-h-screen bg-white/90 backdrop-blur border-x border-slate-200 shadow-[0_20px_50px_-30px_rgba(15,23,42,.35)]" x-data="volunteerApp()">
        <header class="sticky top-0 z-30 border-b border-white/70 bg-white/90 backdrop-blur px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-2xl bg-ink text-white grid place-content-center font-black">M</div>
                    <div>
                        <p class="text-xl font-black tracking-tight leading-none">Mezha</p>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 mt-1">Volunteer Terminal</p>
                    </div>
                </div>
                <button
                    hx-post="/api/auth/logout"
                    hx-swap="none"
                    class="h-10 w-10 rounded-full border border-slate-300 bg-white grid place-content-center text-slate-500 hover:text-red-600 hover:border-red-200"
                    aria-label="Вийти"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>

            <div class="mt-4 grid grid-cols-2 gap-2 rounded-xl bg-slate-100 p-1">
                <button
                    @click="activeTab='pool'"
                    :class="activeTab === 'pool' ? 'bg-white text-ink shadow-sm' : 'text-slate-500'"
                    class="h-10 rounded-lg font-bold text-sm transition"
                >Вільні завдання</button>
                <button
                    @click="activeTab='active'"
                    :class="activeTab === 'active' ? 'bg-white text-ink shadow-sm' : 'text-slate-500'"
                    class="h-10 rounded-lg font-bold text-sm transition relative"
                >
                    Мій виїзд
                    <span x-show="hasActiveTasks" x-cloak class="absolute top-2 right-3 h-2.5 w-2.5 rounded-full bg-flare"></span>
                </button>
            </div>
        </header>

        <main class="p-4 pb-24">
            <section x-show="activeTab === 'pool'" x-transition>
                <div id="pool-list" hx-get="/api/anomalies/pool/html" hx-trigger="load" class="space-y-4">
                    <div class="rounded-2xl border border-slate-200 p-4 bg-white animate-pulse">
                        <div class="h-4 rounded bg-slate-200 w-2/3 mb-3"></div>
                        <div class="h-3 rounded bg-slate-200 w-full mb-5"></div>
                        <div class="h-11 rounded-xl bg-slate-200"></div>
                    </div>
                </div>
            </section>

            <section x-show="activeTab === 'active'" x-cloak x-transition>
                <div x-show="!hasActiveTasks" class="rounded-2xl border border-dashed border-slate-300 p-8 text-center bg-white">
                    <div class="mx-auto h-14 w-14 rounded-full bg-slate-100 grid place-content-center text-slate-400 mb-4">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"></path></svg>
                    </div>
                    <p class="font-bold text-slate-700">Наразі немає активної задачі</p>
                    <p class="text-sm text-slate-500 mt-1">Перейдіть у вкладку «Вільні завдання» і візьміть об'єкт у роботу.</p>
                </div>

                <div x-show="hasActiveTasks" x-cloak class="rounded-3xl border border-slate-200 overflow-hidden bg-white shadow-sm">
                    <div class="h-1.5 bg-flare"></div>

                    <div class="p-5 border-b border-slate-200 bg-slate-50">
                        <div class="flex items-start justify-between gap-4">
                            <div>
                                <p class="text-[10px] uppercase tracking-[0.2em] font-extrabold text-slate-400">Активний виїзд</p>
                                <h2 class="mt-2 text-xl font-black" x-text="activeTask.location || 'Оберіть завдання в пулі'"></h2>
                                <p class="mt-1 text-xs font-mono text-slate-500">Кадастр: <span x-text="activeTask.cadastral || '—'"></span></p>
                            </div>
                            <a :href="`https://maps.google.com/?q=${encodeURIComponent(activeTask.location || '')}`" target="_blank" class="h-10 w-10 rounded-full border border-slate-200 bg-white text-ink grid place-content-center hover:border-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </a>
                        </div>
                    </div>

                    <form
                        class="p-5 space-y-5"
                        enctype="multipart/form-data"
                        x-ref="reportForm"
                    >
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Фото з місця <span class="text-red-600">*</span></label>
                            <div class="relative h-56 rounded-2xl border-2 border-dashed border-slate-300 bg-gradient-to-br from-slate-50 to-slate-100 grid place-content-center overflow-hidden" @click="$refs.photoInput.click()">
                                <template x-if="!photoPreview">
                                    <div class="text-center text-slate-400 px-6">
                                        <svg class="w-11 h-11 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        <p class="text-sm font-semibold text-slate-500">Додайте чітке фото об'єкта</p>
                                        <p class="text-xs mt-1">натисніть, щоб зробити або вибрати з галереї</p>
                                    </div>
                                </template>
                                <template x-if="photoPreview">
                                    <img :src="photoPreview" class="absolute inset-0 h-full w-full object-cover" alt="Фото з місця події">
                                </template>
                                <input type="file" name="photo" accept="image/*" capture="environment" class="hidden" x-ref="photoInput" @change="handlePhotoUpload" required>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Коментар <span class="text-red-600">*</span></label>
                            <textarea name="comment" rows="4" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-500" placeholder="Коротко опишіть фактичний стан на місці..."></textarea>
                        </div>

                        <button type="button" @click="submitReport($refs.reportForm)" class="w-full h-12 rounded-xl bg-ink hover:bg-slate-900 text-white font-extrabold tracking-wide">
                            Відправити на валідацію
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        function volunteerApp() {
            return {
                activeTab: 'pool',
                hasActiveTasks: false,
                activeTask: { id: null, location: '', cadastral: '' },
                pendingTask: null,
                photoPreview: null,
                takingTask: false,
                sendingReport: false,

                handlePhotoUpload(event) {
                    const file = event.target.files[0];
                    if (file) this.photoPreview = URL.createObjectURL(file);
                },

                setPendingTask(event) {
                    const source = event.currentTarget || event.target;
                    const card = source && source.closest ? source.closest('[data-anomaly-id]') : null;
                    if (card) {
                        const cadastral = (card.dataset.anomalyCadastral || '').trim();
                        const owner = (card.dataset.anomalyOwner || '').trim();
                        const rawLocation = (card.dataset.anomalyLocation || '').trim();
                        const locationUnknown = !rawLocation || rawLocation.toLowerCase() === 'локація уточнюється';
                        const resolvedLocation = locationUnknown
                            ? (owner || (cadastral ? `Ділянка ${cadastral}` : 'Локація уточнюється'))
                            : rawLocation;

                        this.pendingTask = {
                            id: card.dataset.anomalyId,
                            location: resolvedLocation,
                            cadastral
                        };
                    }
                },

                async takeTaskFromPool(event) {
                    this.setPendingTask(event);
                    if (!this.pendingTask?.id || this.takingTask) {
                        return;
                    }

                    this.takingTask = true;
                    try {
                        const response = await fetch(`/api/anomalies/${this.pendingTask.id}/take`, {
                            method: 'POST',
                            credentials: 'same-origin'
                        });

                        const raw = await response.text();
                        let payload = {};
                        try {
                            payload = raw ? JSON.parse(raw) : {};
                        } catch {
                            payload = {};
                        }

                        if (!response.ok || !this.pendingTask) {
                            let detail = 'Не вдалося взяти задачу. Оновіть пул і спробуйте ще раз.';
                            if (payload?.detail) {
                                detail = Array.isArray(payload.detail) ? payload.detail.join('; ') : String(payload.detail);
                            }

                            alert(detail);
                            if (window.htmx) {
                                window.htmx.ajax('GET', '/api/anomalies/pool/html', '#pool-list');
                            }
                            return;
                        }

                        this.activeTask = { ...this.pendingTask };
                        this.pendingTask = null;
                        this.hasActiveTasks = true;
                        this.activeTab = 'active';
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } finally {
                        this.takingTask = false;
                    }
                },

                async submitReport(form) {
                    if (!this.activeTask.id) {
                        alert('Спочатку візьміть завдання з пулу.');
                        return;
                    }

                    if (this.sendingReport) {
                        return;
                    }

                    if (!form) {
                        return;
                    }

                    this.sendingReport = true;
                    try {
                        const response = await fetch(`/api/anomalies/${this.activeTask.id}/volunteer-report`, {
                            method: 'POST',
                            credentials: 'same-origin',
                            body: new FormData(form)
                        });

                        const raw = await response.text();
                        let payload = {};
                        try {
                            payload = raw ? JSON.parse(raw) : {};
                        } catch {
                            payload = {};
                        }

                        this.handleReportResponse({ ok: response.ok, payload });
                        if (response.ok) {
                            form.reset();
                        }
                    } finally {
                        this.sendingReport = false;
                    }
                },

                handleReportResponse(result) {
                    if (!result?.ok) {
                        let detail = 'Звіт не збережено. Перевірте фото та коментар.';
                        if (result?.payload?.detail) {
                            detail = Array.isArray(result.payload.detail)
                                ? result.payload.detail.join('; ')
                                : String(result.payload.detail);
                        }
                        alert(detail);
                        return;
                    }

                    this.hasActiveTasks = false;
                    this.activeTab = 'pool';
                    this.activeTask = { id: null, location: '', cadastral: '' };
                    this.pendingTask = null;
                    this.photoPreview = null;
                    if (window.htmx) {
                        window.htmx.ajax('GET', '/api/anomalies/pool/html', '#pool-list');
                    }
                    alert('Звіт успішно надіслано інспектору.');
                }
            };
        }
    </script>
</body>
</html>
